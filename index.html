<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DentalPro Store</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{font-family:Tahoma;margin:0;background:#f5f5f5;}
header{background:#0077b6;color:white;padding:15px;text-align:center;}
.container{padding:10px;}
.card{background:white;margin:10px 0;padding:10px;border-radius:10px;}
img{width:100%;height:180px;object-fit:cover;border-radius:10px;}
button{background:#0077b6;color:white;border:none;padding:10px;width:100%;margin-top:10px;border-radius:8px;}
</style>
</head>

<body>

<header id="storeName">DentalPro Store</header>

<div class="container" id="products"></div>

<script>

// 🔥 ضع بيانات Supabase هنا لاحقاً
const supabaseUrl = "https://ayrlhjixndldzzeaacbt.supabase.co";
const supabaseKey = "PUT_YOUR_PUBLISHABLE_KEY";

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

// 🟢 تحميل الاسم
async function loadSettings(){
    let { data } = await supabase.from('settings').select('*').single();
    if(data){
        document.getElementById("storeName").innerText = data.store_name;
    }
}

// 🟢 تحميل المنتجات
async function loadProducts(){
    let { data } = await supabase.from('products').select('*');

    let box = document.getElementById("products");
    box.innerHTML = "";

    data.forEach(p=>{
        box.innerHTML += `
        <div class="card">
            <img src="${p.image}">
            <h3>${p.name}</h3>
            <p>${p.price}$</p>
        </div>
        `;
    });
}

loadSettings();
loadProducts();

</script>

</body>
</html>
